<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在 | 滑动窗口</title>
    <link rel="stylesheet" href="/css/404.css">
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="/" class="nav__logo">滑动窗口</a>
            <div class="nav__menu" id="nav-menu">
                <ul class="nav__list">
                    <li class="nav__item">
                        <a href="/" class="nav__link">Home</a>
                    </li>
                    <li class="nav__item">
                        <a href="/archives" class="nav__link">Archives</a>
                    </li>
                    <li class="nav__item">
                        <a href="/thoughts" class="nav__link">Thoughts</a>
                    </li>
                    <li class="nav__item">
                        <a href="/about" class="nav__link">About</a>
                    </li>
                </ul>
                <div class="nav__close" id="nav-close">
                    <i class='bx bx-x'></i>
                </div>
            </div>
            <div class="nav__toggle" id="nav-toggle">
                <i class='bx bx-grid-alt'></i>
            </div>
        </nav>
    </header>

    <main class="main">
        <section class="home">
            <div class="home__container container">
                <div class="home__data">
                    <span class="home__subtitle">404</span>
                    <h1 class="home__title">页面走丢了</h1>
                    <p class="home__description">
                        找不到你想要的页面<br>可能已被删除或地址有误
                    </p>
                    <a href="/" class="home__button">
                        返回首页
                    </a>
                </div>

                <div class="home__img">
                    <img src="/img/ghost-img.png" alt="404">
                    <div class="home__shadow"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/scrollreveal.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
